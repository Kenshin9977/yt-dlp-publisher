name: Sync yt-dlp fork and publish

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      force-publish:
        description: 'Force publish even if already up to date'
        type: boolean
        default: false

permissions:
  id-token: write

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Clone yt-dlp fork
        run: |
          git clone --depth=1 --branch master https://x-access-token:${{ secrets.YT_DLP_DISPATCH_TOKEN }}@github.com/Kenshin9977/yt-dlp.git yt-dlp
          cd yt-dlp
          git fetch --unshallow
          git fetch origin package:refs/remotes/origin/package

      - name: Configure git
        working-directory: yt-dlp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        working-directory: yt-dlp
        run: |
          git remote add upstream https://github.com/yt-dlp/yt-dlp.git
          git fetch upstream master

      - name: Check for new upstream commits
        id: check-new
        working-directory: yt-dlp
        run: |
          MERGE_BASE=$(git merge-base HEAD upstream/master)
          UPSTREAM_HEAD=$(git rev-parse upstream/master)
          if [ "$MERGE_BASE" = "$UPSTREAM_HEAD" ]; then
            echo "already-up-to-date=true" >> "$GITHUB_OUTPUT"
            echo "Already up to date with upstream"
          else
            echo "already-up-to-date=false" >> "$GITHUB_OUTPUT"
            echo "New upstream commits found"
          fi

      - name: Merge upstream into master
        id: merge-master
        if: steps.check-new.outputs.already-up-to-date == 'false'
        working-directory: yt-dlp
        run: |
          if git merge upstream/master --no-edit; then
            echo "merge-ok=true" >> "$GITHUB_OUTPUT"
          else
            CONFLICTS=$(git diff --name-only --diff-filter=U | head -20)
            echo "merge-ok=false" >> "$GITHUB_OUTPUT"
            echo "conflicts<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CONFLICTS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            git merge --abort
          fi

      - name: Notify master conflict via Pushover
        if: steps.merge-master.outputs.merge-ok == 'false'
        run: |
          curl -s -F "token=${{ secrets.PUSHOVER_API_TOKEN }}" \
               -F "user=${{ secrets.PUSHOVER_USER_KEY }}" \
               -F "title=yt-dlp sync failed (master)" \
               -F "message=Merge conflict merging upstream into master. Conflicting files: ${{ steps.merge-master.outputs.conflicts }}" \
               -F "priority=1" \
               https://api.pushover.net/1/messages.json

      - name: Fail on master conflict
        if: steps.merge-master.outputs.merge-ok == 'false'
        run: exit 1

      - name: Push master
        if: steps.merge-master.outputs.merge-ok == 'true'
        working-directory: yt-dlp
        run: git push origin master

      - name: Merge master into package
        id: merge-package
        if: steps.merge-master.outputs.merge-ok == 'true'
        working-directory: yt-dlp
        run: |
          git checkout origin/package -B package
          if git merge master --no-edit; then
            echo "merge-ok=true" >> "$GITHUB_OUTPUT"
          else
            CONFLICTS=$(git diff --name-only --diff-filter=U | head -20)
            echo "merge-ok=false" >> "$GITHUB_OUTPUT"
            echo "conflicts<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CONFLICTS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            git merge --abort
          fi

      - name: Notify package conflict via Pushover
        if: steps.merge-package.outputs.merge-ok == 'false'
        run: |
          curl -s -F "token=${{ secrets.PUSHOVER_API_TOKEN }}" \
               -F "user=${{ secrets.PUSHOVER_USER_KEY }}" \
               -F "title=yt-dlp sync failed (package)" \
               -F "message=Merge conflict merging master into package. Conflicting files: ${{ steps.merge-package.outputs.conflicts }}" \
               -F "priority=1" \
               https://api.pushover.net/1/messages.json

      - name: Fail on package conflict
        if: steps.merge-package.outputs.merge-ok == 'false'
        run: exit 1

      - name: Push package
        if: steps.merge-package.outputs.merge-ok == 'true'
        working-directory: yt-dlp
        run: git push origin package

      - name: Checkout package for force publish
        if: inputs.force-publish == true && steps.check-new.outputs.already-up-to-date == 'true'
        working-directory: yt-dlp
        run: git checkout origin/package -B package

      - name: Get version
        if: steps.merge-package.outputs.merge-ok == 'true' || inputs.force-publish == true
        id: version
        working-directory: yt-dlp
        run: |
          VERSION=$(python -c "exec(open('yt_dlp/version.py').read()); print(_pkg_version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if version already published
        if: steps.version.outputs.version != ''
        id: check-pypi
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pypi.org/pypi/yt-dlp-progress/${{ steps.version.outputs.version }}/json")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "already-published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} already on PyPI"
          else
            echo "already-published=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} not yet on PyPI"
          fi

      - name: Set up Python
        if: steps.check-pypi.outputs.already-published == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Run tests
        if: steps.check-pypi.outputs.already-published == 'false'
        working-directory: yt-dlp
        run: |
          pip install -e ".[test]"
          python -m pytest test/test_ffmpeg_progress.py test/test_aria2c_rpc_progress.py -v

      - name: Build package
        if: steps.check-pypi.outputs.already-published == 'false'
        working-directory: yt-dlp
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        if: steps.check-pypi.outputs.already-published == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: yt-dlp/dist/

      - name: Notify publish success via Pushover
        if: steps.check-pypi.outputs.already-published == 'false'
        run: |
          curl -s -F "token=${{ secrets.PUSHOVER_API_TOKEN }}" \
               -F "user=${{ secrets.PUSHOVER_USER_KEY }}" \
               -F "title=yt-dlp-progress published" \
               -F "message=Version ${{ steps.version.outputs.version }} published to PyPI" \
               https://api.pushover.net/1/messages.json
