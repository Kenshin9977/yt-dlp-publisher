name: Trigger yt-dlp sync

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch sync event to yt-dlp fork
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.YT_DLP_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/Kenshin9977/yt-dlp/dispatches \
            -d '{"event_type": "sync-upstream"}'
